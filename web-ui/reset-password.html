<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - ImplantAI</title>
    <!-- CSS Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #F9FAFB;
            /* Light gray bg for reset page */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        .reset-container {
            width: 100%;
            max-width: 480px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .brand-logo-center {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .brand-logo-center .logo-icon {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .brand-logo-center span {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .reset-card {
            background: var(--white);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            width: 100%;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-decoration: none;
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .back-link:hover {
            color: var(--text-main);
        }

        .success-icon {
            width: 64px;
            height: 64px;
            background: #ECFDF5;
            color: #10B981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 1.5rem auto;
        }

        .center-text {
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="reset-container">
        <!-- Logo Header -->
        <div class="brand-logo-center">
            <div class="logo-icon">
                <i class="ph-bold ph-wave-sine"></i>
            </div>
            <span>ImplantAI</span>
        </div>

        <!-- Reset Password View -->
        <div class="reset-card" id="reset-view">
            <a href="index.html" class="back-link">
                <i class="ph-bold ph-arrow-left"></i>
                Back to Login
            </a>

            <h2 style="font-size: 1.5rem; font-weight: 700; color: var(--text-main); margin-bottom: 0.5rem;">Reset
                Password</h2>
            <p style="color: var(--text-secondary); font-size: 0.95rem; line-height: 1.5; margin-bottom: 2rem;">
                Enter your email to receive recovery instructions.
            </p>

            <form onsubmit="event.preventDefault(); showSuccess();">
                <div class="input-group">
                    <label for="reset-email">Email Address</label>
                    <input type="email" id="reset-email" placeholder="dr.wilson@clinic.com" required>
                </div>

                <button type="submit" class="submit-btn" style="margin-top: 1rem;">
                    Send Reset Link
                </button>
            </form>
        </div>

        <!-- Success View (Hidden by default) -->
        <div class="reset-card center-text" id="success-view" style="display: none;">
            <div class="success-icon">
                <i class="ph-bold ph-check"></i>
            </div>

            <h2 style="font-size: 1.5rem; font-weight: 700; color: var(--text-main); margin-bottom: 0.5rem;">Check Your
                Email</h2>

            <p style="color: var(--text-secondary); font-size: 0.95rem; line-height: 1.5; margin-bottom: 2rem;">
                We've sent password reset instructions to <br>
                <b id="user-email" style="color: var(--text-main);">dr.wilson@gmail.com</b>. Please check your inbox and
                follow the link to reset your password.
            </p>

            <a href="index.html"
                style="color: var(--text-main); font-weight: 600; text-decoration: none; font-size: 0.95rem;">
                Back to Login
            </a>
        </div>
    </div>

    <script>
        function showSuccess() {
            const email = document.getElementById('reset-email').value;
            document.getElementById('user-email').innerText = email;

            document.getElementById('reset-view').style.display = 'none';
            document.getElementById('success-view').style.display = 'block';
        }
    </script>
</body>

</html>
